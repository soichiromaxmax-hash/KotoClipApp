<!DOCTYPE html>

<head>

<style>

  h1 { color: #8F99A8; text-align: center; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
  .grid { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; align-items: flex-end; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .badge { background: #111822; border: 1.5px solid rgba(245,184,75,0.55); border-radius: 999px; padding: 5px 16px; color: #F5B84B; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
  .label { color: #6B7280; font-size: 10px; text-align: center; letter-spacing: 0.5px; }
</style>
</head>
<body>
<h1>Hero Background Stages</h1>
<div class="grid">
