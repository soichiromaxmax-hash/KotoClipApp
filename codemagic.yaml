                  patched += 1
                  print('[RCTSwiftUI] Patched RCTSwiftUIContainerView.swift with @preconcurrency imports')
              else:
                  print('[RCTSwiftUI] RCTSwiftUIContainerView.swift already patched or not matched')
          else:
              print('[RCTSwiftUI] RCTSwiftUIContainerView.swift not found')

          # expo-notifications: CategoryManager actor init must be nonisolated so it can be called
          # from any context. nonisolated(unsafe) on the property does NOT fix the init itself.
          categories_module_path = Path('node_modules/expo-notifications/ios/ExpoNotifications/Notifications/Categories/CategoriesModule.swift')
          if categories_module_path.exists():
