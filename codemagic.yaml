workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 90
    environment:
      groups:
        - ios-signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.kotoclip.app
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          echo "=== Installed profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
          xcode-project use-profiles
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/KotoClip.xcworkspace \
            --scheme KotoClip
      - name: Submit to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 -d > /tmp/auth_key.p8
          chmod 600 /tmp/auth_key.p8
          app-store-connect publish \
            --path build/ios/ipa/KotoClip.ipa \
            --private-key @file:/tmp/auth_key.p8 \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --testflight \
            --beta-group "App Store Connect Users"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
