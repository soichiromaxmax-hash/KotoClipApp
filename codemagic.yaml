                  print('[expo-modules-core] Patched SwiftUIViewDefinition.swift getContentView()')
              else:
                  print('[expo-modules-core] SwiftUIViewDefinition.swift already patched or not matched')
          else:
              print('[expo-modules-core] SwiftUIViewDefinition.swift not found')

          # Fix nullability annotations in expo-file-system ObjC headers
          for h in Path('node_modules').rglob('EXSession*Delegate.h'):
              print(f'[nullability] checking: {h}')
              text = h.read_text(encoding='utf-8', errors='replace')
              original = text
              # NSURLSession and NSURLSessionTask are always non-null in delegate callbacks
              text = re.sub(r'\(NSURLSession\s*\*\)', '(NSURLSession * _Nonnull)', text)
              text = re.sub(r'\(NSURLSessionTask\s*\*\)', '(NSURLSessionTask * _Nonnull)', text)
              # NSError in didCompleteWithError is nullable (nil = success)
              text = re.sub(r'\(NSError\s*\*\)(\s*\w)', r'(NSError * _Nullable)\1', text)
              if text != original:
                  h.write_text(text, encoding='utf-8')
                  patched += 1
                  print(f'[nullability] patched: {h.name}')
              else:
                  print(f'[nullability] no change: {h.name}')

          print('extra expo iOS modules patched:', patched)
          if patched == 0:
              raise SystemExit('Failed to patch extra Expo iOS modules')
          PYEOF
      - name: Disable react-native-screens gamma sources
        script: |
          python3 << 'PYEOF'
          from pathlib import Path

          podspec_path = Path('node_modules/react-native-screens/RNScreens.podspec')
