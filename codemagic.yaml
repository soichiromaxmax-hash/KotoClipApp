              )
              if text != original:
                  categories_module_path.write_text(text)
                  patched += 1
                  print('[expo-notifications] Patched CategoriesModule.swift - nonisolated init() on CategoryManager')
              else:
                  print('[expo-notifications] CategoriesModule.swift already patched or not matched')
          else:
              print('[expo-notifications] CategoriesModule.swift not found')

          # expo-modules-core: SwiftUIViewDefinition.swift - getContentView() is @MainActor via HostingView
          swiftui_view_def_path = Path('node_modules/expo-modules-core/ios/Core/Views/SwiftUI/SwiftUIViewDefinition.swift')
          if swiftui_view_def_path.exists():
              text = swiftui_view_def_path.read_text()
