      - name: Disable react-native-screens gamma sources
        script: |
          python3 << 'PYEOF'
          from pathlib import Path

          podspec_path = Path('node_modules/react-native-screens/RNScreens.podspec')
          text = podspec_path.read_text()
          before = text
          text = text.replace(
              "gamma_project_enabled = ENV['RNS_GAMMA_ENABLED'] == '1'",
              "gamma_project_enabled = false"
          )
          podspec_path.write_text(text)
          print('RNScreens gamma forced off:', text != before)
          if "gamma_project_enabled = false" not in text:
              raise SystemExit('Failed to force RNScreens gamma off')
          PYEOF
      - name: Expo prebuild
        script: |
          export RNS_GAMMA_ENABLED=0
          npx expo prebuild --platform ios --clean
      - name: Patch Podfile for Swift concurrency errors
        script: |
          python3 << 'PYEOF'
          from pathlib import Path

          podfile_path = Path('ios/Podfile')
          podfile = podfile_path.read_text()
          lines = podfile.splitlines()

          marker = "# KotoClip Swift 5.9 fix"
          inject = """  {marker}
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '6.0'
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
              end
            end
            installer.aggregate_targets.each do |aggregate_target|
              aggregate_target.user_project.native_targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['SWIFT_VERSION'] = '6.0'
                  config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                end
              end
              aggregate_target.user_project.save
            end
          """.format(marker=marker)

          patched = False
          if marker in podfile:
              patched = True
          else:
              result = []
              inserted = False
              for line in lines:
                  result.append(line)
                  if (not inserted) and line.strip() == 'post_install do |installer|':
                      result.extend(inject.splitlines())
                      inserted = True
              if inserted:
                  podfile = "\n".join(result) + "\n"
                  patched = True
              else:
                  podfile = podfile.rstrip() + "\n\npost_install do |installer|\n" + inject + "\nend\n"
                  patched = True

          podfile_path.write_text(podfile)
          print('Podfile patched:', patched)
          if not patched or marker not in podfile:
              raise SystemExit('Failed to patch Podfile with Swift 6.0 fix')
          PYEOF
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          echo "=== Installed profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          export RNS_GAMMA_ENABLED=0
          cd ios && pod install
      - name: Force Swift 6.0 in generated Xcode projects
        script: |
          python3 << 'PYEOF'
          from pathlib import Path
          import re

          files = [
              Path('ios/Pods/Pods.xcodeproj/project.pbxproj'),
              Path('ios/KotoClip.xcodeproj/project.pbxproj'),
          ]

          for path in files:
              if not path.exists():
                  print(f'skip missing: {path}')
                  continue
              text = path.read_text()
              original = text
              text = re.sub(r'SWIFT_VERSION = [^;]+;', 'SWIFT_VERSION = 6.0;', text)
              text = re.sub(r'SWIFT_STRICT_CONCURRENCY = [^;]+;', 'SWIFT_STRICT_CONCURRENCY = minimal;', text)
              if 'SWIFT_STRICT_CONCURRENCY = minimal;' not in text:
                  text = text.replace('SWIFT_VERSION = 6.0;', 'SWIFT_VERSION = 6.0;\n\t\t\t\tSWIFT_STRICT_CONCURRENCY = minimal;')
              path.write_text(text)
              print(f'patched swift version: {path} changed={text != original}')
          PYEOF
      - name: Build IPA
        script: |
          set -eo pipefail
          export RNS_GAMMA_ENABLED=0
          ARCHIVE_PATH=/tmp/KotoClip.xcarchive

          # Archive — 全出力がそのまま Codemagic ログに流れる
          xcodebuild \
            -workspace ios/KotoClip.xcworkspace \
            -scheme KotoClip \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=9U2YJ4XL4K \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual

          # ExportOptions.plist
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>9U2YJ4XL4K</string>
          </dict>
          </plist>
          PLIST

          # Export IPA
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa
      - name: Submit to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 -d > /tmp/auth_key.p8
          chmod 600 /tmp/auth_key.p8
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --private-key @file:/tmp/auth_key.p8 \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa
