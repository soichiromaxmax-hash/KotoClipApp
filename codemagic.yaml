          patched += 1
          print('[RCTSwiftUI] Created RCTSwiftUIContainerViewObjC.h in wrapper directory')

          rct_wrapper_m = Path('node_modules/react-native/ReactApple/RCTSwiftUIWrapper/RCTSwiftUIContainerViewWrapper.m')
          if rct_wrapper_m.exists():
