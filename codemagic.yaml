          before = text
          text = text.replace(
              "gamma_project_enabled = ENV['RNS_GAMMA_ENABLED'] == '1'",
              "gamma_project_enabled = false"
          )
          podspec_path.write_text(text)
          print('RNScreens gamma forced off:', text != before)
          if "gamma_project_enabled = false" not in text:
