          PYEOF
      - name: Expo prebuild
        script: |
          export RNS_GAMMA_ENABLED=0
          npx expo prebuild --platform ios --clean
      - name: Patch Podfile for Swift concurrency errors
        script: |
          python3 << 'PYEOF'
          from pathlib import Path

          podfile_path = Path('ios/Podfile')
          podfile = podfile_path.read_text()
          lines = podfile.splitlines()

          marker = "# KotoClip Swift 5.9 fix"
          inject = """  {marker}
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                if target.name.include?('ExpoFileSystem') || target.name.include?('expo-file-system')
                  config.build_settings['GCC_WARN_ABOUT_MISSING_FIELD_INITIALIZERS'] = 'NO'
                  config.build_settings['CLANG_WARN_NULLABLE_TO_NONNULL_CONVERSION'] = 'NO'
                end
                if target.name == 'RCTSwiftUI'
                  config.build_settings['DEFINES_MODULE'] = 'YES'
                  config.build_settings['CLANG_ENABLE_MODULES'] = 'YES'
                end
                if target.name == 'RCTSwiftUIWrapper'
                  config.build_settings['CLANG_ENABLE_MODULES'] = 'YES'
                end
              end
            end
            installer.aggregate_targets.each do |aggregate_target|
              aggregate_target.user_project.native_targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['SWIFT_VERSION'] = '6.0'
                  config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                  config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                end
              end
              aggregate_target.user_project.save
            end
          """.replace('{marker}', marker)

          patched = False
          if marker in podfile:
              patched = True
          else:
              result = []
              inserted = False
              for line in lines:
                  result.append(line)
                  if (not inserted) and line.strip() == 'post_install do |installer|':
                      result.extend(inject.splitlines())
                      inserted = True
              if inserted:
                  podfile = "\n".join(result) + "\n"
                  patched = True
              else:
                  podfile = podfile.rstrip() + "\n\npost_install do |installer|\n" + inject + "\nend\n"
                  patched = True

          podfile_path.write_text(podfile)
          print('Podfile patched:', patched)
          if not patched or marker not in podfile:
              raise SystemExit('Failed to patch Podfile with Swift 6.0 fix')
          PYEOF
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          echo "=== Installed profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          export RNS_GAMMA_ENABLED=0
          # hermes-engine のソースコンパイル（CMake）を回避するため prebuilt tarball を強制使用
          HERMES_VERSION="0.14.1"
          HERMES_TARBALL_DIR="/tmp/hermes-engine-artifacts"
          mkdir -p "$HERMES_TARBALL_DIR"
          HERMES_TARBALL="${HERMES_TARBALL_DIR}/hermes-ios-${HERMES_VERSION}-hermes-ios-debug.tar.gz"
          if [ ! -f "$HERMES_TARBALL" ]; then
            echo "[hermes] Downloading prebuilt tarball..."
            curl -L "https://repo1.maven.org/maven2/com/facebook/hermes/hermes-ios/${HERMES_VERSION}/hermes-ios-${HERMES_VERSION}-hermes-ios-debug.tar.gz" \
              -o "$HERMES_TARBALL"
          fi
          echo "[hermes] Using prebuilt tarball: $HERMES_TARBALL"
          export HERMES_ENGINE_TARBALL_PATH="$HERMES_TARBALL"
          cd ios && pod install
      - name: Force Swift 6.0 in generated Xcode projects
        script: |
          python3 << 'PYEOF'
          from pathlib import Path
          import re

          file_configs = [
              (Path('ios/Pods/Pods.xcodeproj/project.pbxproj'), '5.0'),
              (Path('ios/KotoClip.xcodeproj/project.pbxproj'), '6.0'),
          ]

          for path, swift_version in file_configs:
              if not path.exists():
                  print(f'skip missing: {path}')
                  continue
              text = path.read_text()
              original = text
              text = re.sub(r'SWIFT_VERSION = [^;]+;', f'SWIFT_VERSION = {swift_version};', text)
              text = re.sub(r'SWIFT_STRICT_CONCURRENCY = [^;]+;', 'SWIFT_STRICT_CONCURRENCY = minimal;', text)
              if 'SWIFT_STRICT_CONCURRENCY = minimal;' not in text:
                  text = text.replace(f'SWIFT_VERSION = {swift_version};', f'SWIFT_VERSION = {swift_version};\n\t\t\t\tSWIFT_STRICT_CONCURRENCY = minimal;')
              text = re.sub(r'GCC_TREAT_WARNINGS_AS_ERRORS = YES;', 'GCC_TREAT_WARNINGS_AS_ERRORS = NO;', text)
              if 'GCC_TREAT_WARNINGS_AS_ERRORS = NO;' not in text:
                  text = text.replace('SWIFT_STRICT_CONCURRENCY = minimal;', 'SWIFT_STRICT_CONCURRENCY = minimal;\n\t\t\t\tGCC_TREAT_WARNINGS_AS_ERRORS = NO;', 1)
              path.write_text(text)
              print(f'patched swift version: {path} swift={swift_version} changed={text != original}')
          PYEOF
      - name: Build IPA
        script: |
          set -eo pipefail
          export RNS_GAMMA_ENABLED=0
          ARCHIVE_PATH=/tmp/KotoClip.xcarchive

          # Archive — 全出力がそのまま Codemagic ログに流れる
          xcodebuild \
            -workspace ios/KotoClip.xcworkspace \
            -scheme KotoClip \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=9U2YJ4XL4K \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO

          # ExportOptions.plist
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>9U2YJ4XL4K</string>
          </dict>
          </plist>
          PLIST

          # Export IPA
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa
      - name: Submit to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 -d > /tmp/auth_key.p8
          chmod 600 /tmp/auth_key.p8
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --private-key @file:/tmp/auth_key.p8 \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa
