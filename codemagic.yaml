workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: Codemagic admin
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.kotoclip.app
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/KotoClip.xcworkspace \
            --scheme KotoClip
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users
