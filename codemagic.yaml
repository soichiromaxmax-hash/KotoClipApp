workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 90
    environment:
      groups:
        - ios-signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: jp.kotoclip.app
      node: 20
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          echo "=== Installed profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
          xcode-project use-profiles
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          set -eo pipefail
          ARCHIVE_PATH=/tmp/KotoClip.xcarchive

          # Archive — 全出力がそのまま Codemagic ログに流れる
          xcodebuild \
            -workspace ios/KotoClip.xcworkspace \
            -scheme KotoClip \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=9U2YJ4XL4K \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual

          # ExportOptions.plist
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>9U2YJ4XL4K</string>
          </dict>
          </plist>
          PLIST

          # Export IPA
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/ios/ipa
      - name: Submit to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_B64" | base64 -d > /tmp/auth_key.p8
          chmod 600 /tmp/auth_key.p8
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --private-key @file:/tmp/auth_key.p8 \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID
    artifacts:
      - build/ios/ipa/*.ipa
