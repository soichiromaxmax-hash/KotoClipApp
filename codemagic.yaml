                  print('[RCTSwiftUI] Patched RCTSwiftUIContainerViewWrapper.m -> #import "RCTSwiftUIContainerViewObjC.h"')
              else:
                  print('[RCTSwiftUI] RCTSwiftUIContainerViewWrapper.m already patched')
          else:
              print('[RCTSwiftUI] RCTSwiftUIContainerViewWrapper.m not found')

          # Add @preconcurrency imports to RCTSwiftUIContainerView.swift for Swift 6.0 compatibility
          rct_container_view = Path('node_modules/react-native/ReactApple/RCTSwiftUI/RCTSwiftUIContainerView.swift')
          if rct_container_view.exists():
              text = rct_container_view.read_text(encoding='utf-8')
