<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KotoClip Splash Generator</title>
<style>
  body { background: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; }
  canvas { border-radius: 16px; }
  button { background: #7CF7DF; color: #0E1116; border: none; padding: 14px 32px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
  button:hover { opacity: 0.85; }
  .note { color: #aaa; font-size: 13px; text-align: center; max-width: 500px; }
</style>
</head>
<body>
<h2>KotoClip Splash Screen Generator</h2>
<canvas id="c" width="1024" height="1024"></canvas>
<button id="dl">PNG ダウンロード (1024×1024)</button>
<p class="note">
  ダウンロードした PNG を <code>assets/images/splash-icon.png</code> に上書きしてください。
</p>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@700&family=Space+Grotesk:wght@700&display=block">

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 1024, H = 1024;

function drawKotoBird(ctx, cx, cy, scale) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // Body
  ctx.fillStyle = '#7CF7DF';
  ctx.beginPath();
  ctx.ellipse(0, 0, 52, 42, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(12, -46, 32, 30, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Wing left
  ctx.fillStyle = '#5CE0C8';
  ctx.beginPath();
  ctx.ellipse(-42, 4, 22, 13, Math.PI * 0.25, 0, Math.PI * 2);
  ctx.fill();

  // Wing right
  ctx.beginPath();
  ctx.ellipse(42, 4, 22, 13, -Math.PI * 0.25, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.fillStyle = '#5CE0C8';
  ctx.beginPath();
  ctx.moveTo(-10, 36);
  ctx.lineTo(-28, 66);
  ctx.lineTo(0, 54);
  ctx.lineTo(28, 66);
  ctx.lineTo(10, 36);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#0E1116';
  ctx.beginPath();
  ctx.ellipse(22, -50, 7, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(24, -52, 2.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FFD166';
  ctx.beginPath();
  ctx.moveTo(40, -46);
  ctx.lineTo(58, -42);
  ctx.lineTo(40, -36);
  ctx.closePath();
  ctx.fill();

  // Clip symbol on chest
  ctx.strokeStyle = '#0E1116';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-10, -12);
  ctx.lineTo(-10, 12);
  ctx.lineTo(10, 12);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-3, -12);
  ctx.lineTo(-3, 4);
  ctx.lineTo(10, 4);
  ctx.stroke();

  ctx.restore();
}

async function draw() {
  // Background — transparent (app.json sets backgroundColor)
  ctx.clearRect(0, 0, W, H);

  // Bird centered upper area
  drawKotoBird(ctx, W / 2, H * 0.38, 4.2);

  // Wait for fonts
  await document.fonts.load('700 200px "Lobster Two"');
  await document.fonts.load('700 200px "Space Grotesk"');

  // "Koto" text
  ctx.font = '700 172px "Lobster Two"';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'right';
  ctx.letterSpacing = '-6px';
  ctx.fillText('Koto', W / 2 + 2, H * 0.74);

  // "Clip" text with teal color
  ctx.font = '700 150px "Space Grotesk"';
  ctx.fillStyle = '#7CF7DF';
  ctx.textAlign = 'left';
  ctx.letterSpacing = '-8px';
  ctx.fillText('Clip', W / 2 + 4, H * 0.74);

  // Tagline
  ctx.font = '400 36px "Space Grotesk"';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '2px';
  ctx.fillText('出会った単語を、すぐ保存。', W / 2, H * 0.82);
}

draw();

document.getElementById('dl').addEventListener('click', () => {
  draw().then(() => {
    const a = document.createElement('a');
    a.download = 'splash-icon.png';
    a.href = C.toDataURL('image/png');
    a.click();
  });
});
</script>
</body>
</html>
