name: Build and upload to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications/ | grep "^Xcode" | sort
          for ver in 16.3 16.2 16.1 16.0; do
            if [ -d "/Applications/Xcode_${ver}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${ver}.app/Contents/Developer"
              echo "Selected Xcode ${ver}"
              break
            fi
          done
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$ASC_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Run patches and pod install
        env:
          CI_WORKSPACE: ${{ github.workspace }}
          APPLE_TEAM_ID: 9U2YJ4XL4K
        run: bash ci_scripts/ci_post_clone.sh

      - name: Verify ios/ after pod install
        run: |
          echo "=== ios/ top-level ===" && ls ios/
          echo "=== xcworkspace ===" && test -d ios/KotoClip.xcworkspace && echo "EXISTS" || echo "MISSING"
          echo "=== Pods/ ===" && test -d ios/Pods && echo "EXISTS" || echo "MISSING"

      - name: Setup Distribution certificate
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          sudo gem install fastlane --no-document 2>&1 | tail -3

          # Write API key JSON for fastlane
          python3 -c "
          import os, json, pathlib
          kid = os.environ['ASC_KEY_ID']
          key = pathlib.Path(os.environ['RUNNER_TEMP'] + '/private_keys/AuthKey_' + kid + '.p8').read_text()
          json.dump({'key_id': kid, 'issuer_id': os.environ['ASC_ISSUER_ID'], 'key': key, 'in_house': False}, open('/tmp/api_key.json', 'w'))
          print('API key JSON written')
          "

          if [ -n "$CERT_P12" ]; then
            echo "Importing Distribution certificate from GitHub Secret..."
            echo "$CERT_P12" | base64 --decode > /tmp/dist.p12
            security create-keychain -p "build" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "build" build.keychain
            security import /tmp/dist.p12 \
              -k build.keychain \
              -P "$CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/xcodebuild
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
            rm /tmp/dist.p12
            echo "Certificate imported successfully."
          else
            echo "DISTRIBUTION_CERT_P12 not set — creating new certificate via fastlane cert..."
            P12_PASS="kotoclip_$(date +%Y%m)"
            fastlane cert --development false --api_key_path /tmp/api_key.json

            # Export the newly created cert+key as .p12 for future runs
            security export \
              -k ~/Library/Keychains/login.keychain-db \
              -t identities \
              -f pkcs12 \
              -P "$P12_PASS" \
              -o /tmp/dist_new.p12

            echo ""
            echo "========================================================"
            echo "ACTION REQUIRED: Add these two GitHub Secrets to avoid"
            echo "re-creating the certificate on every run:"
            echo ""
            echo "Secret name : DISTRIBUTION_CERT_P12"
            echo "Secret value: $(base64 -i /tmp/dist_new.p12)"
            echo ""
            echo "Secret name : DISTRIBUTION_CERT_PASSWORD"
            echo "Secret value: $P12_PASS"
            echo "========================================================"
            rm /tmp/dist_new.p12
          fi

      - name: Download provisioning profiles
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$RUNNER_TEMP/profiles"

          # Ensure App Groups capability is enabled on both App IDs
          for BID in "jp.kotoclip.app" "jp.kotoclip.app.share"; do
            fastlane produce enable_services \
              --app_identifier "$BID" \
              --api_key_path /tmp/api_key.json \
              --app-group 2>&1 | tail -5 || true
            fastlane produce associate_group \
              --app_identifier "$BID" \
              --api_key_path /tmp/api_key.json \
              -g "group.jp.kotoclip.app" 2>&1 | tail -5 || true
          done

          # Create/download App Store Distribution profiles for both targets
          fastlane sigh \
            --app_identifier "jp.kotoclip.app" \
            --development false \
            --api_key_path /tmp/api_key.json \
            --output_path "$RUNNER_TEMP/profiles" \
            --filename "main.mobileprovision" \
            --force

          fastlane sigh \
            --app_identifier "jp.kotoclip.app.share" \
            --development false \
            --api_key_path /tmp/api_key.json \
            --output_path "$RUNNER_TEMP/profiles" \
            --filename "share.mobileprovision" \
            --force

          # sigh (skip_install: false by default) already installs profiles to
          # ~/Library/MobileDevice/Provisioning Profiles/ — no manual copy needed.
          echo "Installed profiles:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null | tail -5 || true

      - name: Patch pbxproj signing for Distribution
        run: |
          python3 - <<'PYEOF'
          import pathlib, re
          pbxproj = pathlib.Path('ios/KotoClip.xcodeproj/project.pbxproj')
          content = pbxproj.read_text()

          # 1. TargetAttributes: ProvisioningStyle = Automatic -> Manual
          #    This is the key override that kept Xcode in Development mode.
          c1 = content.count('ProvisioningStyle = Automatic;')
          content = content.replace('ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;')

          # 2. Build settings: CODE_SIGN_STYLE = Automatic -> Manual
          c2 = content.count('CODE_SIGN_STYLE = Automatic;')
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')

          # 3. CODE_SIGN_IDENTITY: "iPhone Developer" -> "Apple Distribution"
          c3 = content.count('CODE_SIGN_IDENTITY = "iPhone Developer";')
          content = content.replace('CODE_SIGN_IDENTITY = "iPhone Developer";', 'CODE_SIGN_IDENTITY = "Apple Distribution";')

          # 4. Any empty identity -> Apple Distribution
          c4 = content.count('CODE_SIGN_IDENTITY = "";')
          content = content.replace('CODE_SIGN_IDENTITY = "";', 'CODE_SIGN_IDENTITY = "Apple Distribution";')

          pbxproj.write_text(content)
          print(f"ProvisioningStyle patched: {c1}, CODE_SIGN_STYLE patched: {c2}, iPhone Developer->AppleDistribution: {c3}, empty->AppleDistribution: {c4}")
          PYEOF

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/KotoClip.xcworkspace \
            -scheme KotoClip \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/KotoClip.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=9U2YJ4XL4K

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          plist = """<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9U2YJ4XL4K</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          """
          pathlib.Path(os.environ["RUNNER_TEMP"] + "/ExportOptions.plist").write_text(plist)
          print("ExportOptions.plist written")
          PYEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/KotoClip.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/KotoClip.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --apiKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
