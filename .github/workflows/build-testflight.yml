name: Build and upload to TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Check Xcode environment
        run: |
          echo "=== Default Xcode (no xcode-select change) ==="
          xcode-select -p
          xcodebuild -version
          sudo xcodebuild -license accept 2>/dev/null || true
          echo "=== iOS SDKs ==="
          xcodebuild -showsdks 2>/dev/null | grep -i ios || echo "(none)"
          echo "=== iOS runtimes ==="
          xcrun simctl list runtimes 2>/dev/null | grep -i ios || echo "(none)"
          echo "=== iPhoneOS platform ==="
          ls "$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs/" 2>/dev/null || echo "(not found)"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$ASC_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Run patches and pod install
        env:
          CI_WORKSPACE: ${{ github.workspace }}
          APPLE_TEAM_ID: 9U2YJ4XL4K
        run: bash ci_scripts/ci_post_clone.sh

      - name: Verify ios/ after pod install
        run: |
          echo "=== ios/ top-level ===" && ls ios/
          echo "=== xcworkspace ===" && test -d ios/KotoClip.xcworkspace && echo "EXISTS" || echo "MISSING"
          echo "=== Pods/ ===" && test -d ios/Pods && echo "EXISTS" || echo "MISSING"

      - name: Setup Distribution certificate
        env:
          CERT_P12: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          sudo gem install fastlane --no-document 2>&1 | tail -3

          python3 -c "
          import os, json, pathlib
          kid = os.environ['ASC_KEY_ID']
          key = pathlib.Path(os.environ['RUNNER_TEMP'] + '/private_keys/AuthKey_' + kid + '.p8').read_text()
          json.dump({'key_id': kid, 'issuer_id': os.environ['ASC_ISSUER_ID'], 'key': key, 'in_house': False}, open('/tmp/api_key.json', 'w'))
          print('API key JSON written')
          "

          if [ -n "$CERT_P12" ]; then
            echo "Importing Distribution certificate from GitHub Secret..."
            echo "$CERT_P12" | base64 --decode > /tmp/dist.p12
            security create-keychain -p "build" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "build" build.keychain
            security import /tmp/dist.p12 \
              -k build.keychain \
              -P "$CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/xcodebuild
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain
            rm /tmp/dist.p12
            echo "Certificate imported successfully."
          else
            echo "DISTRIBUTION_CERT_P12 not set — creating new certificate via fastlane cert..."
            P12_PASS="kotoclip_$(date +%Y%m)"
            fastlane cert --development false --api_key_path /tmp/api_key.json

            security export \
              -k ~/Library/Keychains/login.keychain-db \
              -t identities \
              -f pkcs12 \
              -P "$P12_PASS" \
              -o /tmp/dist_new.p12

            echo ""
            echo "========================================================"
            echo "Secret name : DISTRIBUTION_CERT_P12"
            echo "Secret value: $(base64 -i /tmp/dist_new.p12)"
            echo ""
            echo "Secret name : DISTRIBUTION_CERT_PASSWORD"
            echo "Secret value: $P12_PASS"
            echo "========================================================"
            rm /tmp/dist_new.p12
          fi

      - name: Download provisioning profiles
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$RUNNER_TEMP/profiles"

          for BID in "jp.kotoclip.app" "jp.kotoclip.app.share"; do
            fastlane produce enable_services \
              --app_identifier "$BID" \
              --api_key_path /tmp/api_key.json \
              --app-group || true
            fastlane produce associate_group \
              --app_identifier "$BID" \
              --api_key_path /tmp/api_key.json \
              -g "group.jp.kotoclip.app" || true
          done

          fastlane sigh \
            --app_identifier "jp.kotoclip.app" \
            --development false \
            --api_key_path /tmp/api_key.json \
            --output_path "$RUNNER_TEMP/profiles" \
            --filename "main.mobileprovision" \
            --force

          fastlane sigh \
            --app_identifier "jp.kotoclip.app.share" \
            --development false \
            --api_key_path /tmp/api_key.json \
            --output_path "$RUNNER_TEMP/profiles" \
            --filename "share.mobileprovision" \
            --force

          python3 - <<'PYEOF'
          import subprocess, plistlib, sys, os
          rt = os.environ['RUNNER_TEMP']
          ok = True
          for name, path in [('main', rt+'/profiles/main.mobileprovision'),
                              ('share', rt+'/profiles/share.mobileprovision')]:
              r = subprocess.run(['openssl','smime','-inform','DER','-verify','-noverify','-in',path],
                                 capture_output=True)
              plist = plistlib.loads(r.stdout)
              ents  = plist.get('Entitlements', {})
              groups = ents.get('com.apple.security.application-groups')
              uuid   = plist.get('UUID','?')
              print(f"[{name}] UUID={uuid}")
              print(f"[{name}] AppID={ents.get('application-identifier','?')}")
              print(f"[{name}] AppGroups={groups or 'NOT PRESENT'}")
              if not groups:
                  print(f"ERROR: App Groups missing from {name} profile!", file=sys.stderr)
                  ok = False
          sys.exit(0 if ok else 1)
          PYEOF

          python3 - <<'PYEOF2'
          import subprocess, plistlib, os
          rt = os.environ['RUNNER_TEMP']
          for env_name, path in [('MAIN_PROFILE_UUID', rt+'/profiles/main.mobileprovision'),
                                  ('SHARE_PROFILE_UUID', rt+'/profiles/share.mobileprovision')]:
              r = subprocess.run(['openssl','smime','-inform','DER','-verify','-noverify','-in',path],
                                 capture_output=True)
              plist = plistlib.loads(r.stdout)
              uuid = plist['UUID']
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f"{env_name}={uuid}\n")
              print(f"{env_name}={uuid}")
          PYEOF2

      - name: Patch pbxproj for Manual signing
        run: |
          python3 - <<'PYEOF'
          import pathlib, os, re
          pbxproj_path = pathlib.Path('ios/KotoClip.xcodeproj/project.pbxproj')
          content = pbxproj_path.read_text()
          main_uuid = os.environ['MAIN_PROFILE_UUID']
          share_uuid = os.environ['SHARE_PROFILE_UUID']
          c1 = content.count('ProvisioningStyle = Automatic;')
          content = content.replace('ProvisioningStyle = Automatic;', 'ProvisioningStyle = Manual;')
          c2 = content.count('CODE_SIGN_STYLE = Automatic;')
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          print(f"ProvisioningStyle patched: {c1}, CODE_SIGN_STYLE patched: {c2}")
          for bid, uuid in [('jp.kotoclip.app', main_uuid), ('jp.kotoclip.app.share', share_uuid)]:
              def make_replacer(u):
                  def replacer(m):
                      block = m.group(0)
                      if 'PROVISIONING_PROFILE_SPECIFIER' in block:
                          return re.sub(r'PROVISIONING_PROFILE_SPECIFIER = [^;]+;',
                                        f'PROVISIONING_PROFILE_SPECIFIER = "{u}";', block)
                      return block[:-1] + f'\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{u}";\n\t\t\t' + '}'
                  return replacer
              pattern = (r'buildSettings = \{[^{}]*?PRODUCT_BUNDLE_IDENTIFIER = "?'
                         + re.escape(bid) + r'"?;[^{}]*?\}')
              new_content = re.sub(pattern, make_replacer(uuid), content, flags=re.DOTALL)
              count = new_content.count(f'PROVISIONING_PROFILE_SPECIFIER = "{uuid}"')
              print(f"{bid}: {count} profile specifier(s) set")
              content = new_content
          pbxproj_path.write_text(content)
          PYEOF

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/KotoClip.xcworkspace \
            -scheme KotoClip \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/KotoClip.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=9U2YJ4XL4K

      - name: Export IPA
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          main_uuid = os.environ['MAIN_PROFILE_UUID']
          share_uuid = os.environ['SHARE_PROFILE_UUID']
          plist = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9U2YJ4XL4K</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>jp.kotoclip.app</key>
              <string>{main_uuid}</string>
              <key>jp.kotoclip.app.share</key>
              <string>{share_uuid}</string>
            </dict>
          </dict>
          </plist>
          """
          pathlib.Path(os.environ["RUNNER_TEMP"] + "/ExportOptions.plist").write_text(plist)
          print("ExportOptions.plist written")
          PYEOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/KotoClip.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/KotoClip.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --apiKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
